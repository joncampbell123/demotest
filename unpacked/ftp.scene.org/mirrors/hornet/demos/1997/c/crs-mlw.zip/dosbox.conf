# This is the configuration file for DOSBox 0.800. (Please use the latest version of DOSBox)
# Lines starting with a # are comment lines and are ignored by DOSBox.
# They are used to (briefly) document the effect of each option.
[dosbox]
memsize=16

[cpu]
core=normal
cputype=pentium
# WARNING: Higher cycle counts, like 120000 produce Mode-X tearlines, especially during the credits.
cycles=60000

[dos]
umb=false

[gus]
# GUS playback technically works, but the music playback is completely broken.
# Set to true if you want to hear random instruments instead of coherent music.
gus=false

[speaker]
pcspeaker=true
initial frequency=0
disney=true

[sblaster]
sbtype=sb16

[autoexec]
mount c: .
c:
REM ------ RUN THE DEMO -------
MELLOW.EXE

